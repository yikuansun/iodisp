name: Build Electron App

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Linux: native build deps for uiohook-napi (libuiohook uses X11/Xt/Xtst)
      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libx11-dev libxtst-dev libxinerama-dev libxt-dev

      # Windows: point node-gyp at the VS2022 MSBuild that ships on the runner
      - name: Configure node-gyp for Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msbuild = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe
          npm config set msbuild_path "$msbuild"

      - run: npm ci

      - run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.zip
            dist/*.deb
          if-no-files-found: ignore
